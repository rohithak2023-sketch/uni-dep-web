apiVersion: apps/v1
kind: Deployment
metadata:
  name: dept-web-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dept-web
  template:
    metadata:
      labels:
        app: dept-web
    spec:
      containers:
      - name: dept-web
        image: your-dockerhub-username/uni-dept:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: dept-web-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: dept-web
